# ========================================
# Common Configuration (All Profiles)
# ========================================

# Application Name
spring.application.name=springboot-jwt-demo

# JPA Configuration
spring.jpa.open-in-view=false

# Server Configuration
server.port=${PORT:8080}

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=false
spring.servlet.multipart.resolve-lazily=true
spring.resources.cache.cachecontrol.cache-public=true
spring.servlet.multipart.file-size-threshold=0KB

# MVC Configuration
spring.mvc.favicon.enabled=false

# HTTP/2 and Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
server.http2.enabled=true

# Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# HikariCP Connection Pool
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

# JWT Configuration (externalized for security — no default, must be set via env var)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Default Profile (if none specified, use dev)
spring.profiles.default=dev
