# Production Profile Configuration

# Database Configuration (externalized via environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/springbootjwt}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (shorter expiration for production - 1 hour)
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# CORS Configuration (must be explicitly set in production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator Configuration (minimal endpoints for production)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Logging Configuration
logging.level.com.sergiovitorino.springbootjwt=INFO
logging.level.org.springframework.security=WARN
