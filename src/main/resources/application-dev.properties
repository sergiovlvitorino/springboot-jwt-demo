# Development Profile Configuration

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:devdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (only for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (safe default for dev only — never use in production)
jwt.secret=${JWT_SECRET:dev-only-secret-not-for-production-minimum-32chars!!}
jwt.expiration=86400000

# CORS Configuration (local development origins)
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080

# Actuator Configuration (more endpoints exposed for dev)
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.com.sergiovitorino.springbootjwt=DEBUG
logging.level.org.springframework.security=DEBUG
